<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🦖 やることりすと 🦕</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: 'Hiragino Maru Gothic Pro', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: linear-gradient(135deg, #F0F4FF 0%, #FFF7ED 100%);
      user-select: none; -webkit-user-select: none;
    }

    /* 背景の恐竜 */
    #dinoBg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .dino { position:absolute; opacity:.08; animation:dinoFloat ease-in-out infinite; }
    @keyframes dinoFloat {
      0%,100% { transform:translateY(0) rotate(-8deg); }
      50%     { transform:translateY(-18px) rotate(8deg); }
    }

    /* ── レイアウト ── */
    .wrap { position:relative; z-index:1; display:flex; height:100vh; width:100vw; }

    /* 縦向き：上にタスク、下に時計 */
    @media (orientation:portrait) {
      .wrap  { flex-direction:column; }
      .left  { width:100% !important; height:60% !important; border-right:none !important; border-bottom:1px solid rgba(0,0,0,.07); }
      .right { width:100% !important; height:40% !important; }
    }

    /* ───── 左：タスク ───── */
    .left {
      width:52%; height:100%;
      padding:10px 12px 8px;
      display:flex; flex-direction:column;
      background:rgba(255,255,255,.55);
      backdrop-filter:blur(10px);
      border-right:1px solid rgba(0,0,0,.07);
    }

    .board-header {
      display:flex; align-items:center; justify-content:center;
      gap:6px; margin-bottom:8px; flex-shrink:0;
    }
    .board-title {
      font-size:clamp(1.1rem,2.5vw,1.9rem);
      font-weight:900; color:#1E293B;
    }

    /* あさ／よる 切り替えボタン */
    .mode-toggle { display:flex; gap:6px; margin-bottom:8px; flex-shrink:0; }
    .mode-btn {
      flex:1; padding:7px 8px; border-radius:14px;
      border:2px solid #E2E8F0; background:rgba(255,255,255,.75);
      color:#64748B; font-weight:800; font-family:inherit;
      font-size:clamp(.85rem,1.7vw,1.1rem);
      cursor:pointer; touch-action:manipulation;
      transition:all .3s;
    }
    .mode-btn.active.mode-morning {
      background:linear-gradient(135deg,#FFD54F,#FF8F00);
      border-color:#FF8F00; color:#7C2D12;
      box-shadow:0 3px 10px rgba(255,143,0,.35);
    }
    .mode-btn.active.mode-evening {
      background:linear-gradient(135deg,#4C5B84,#1E293B);
      border-color:#1E293B; color:white;
      box-shadow:0 3px 10px rgba(30,41,59,.35);
    }

    .tasks { flex:1; display:flex; flex-direction:column; gap:6px; overflow-y:auto; min-height:0; }

    /* ── タスクボタン（タップ前：白） ── */
    .task {
      flex:1; min-height:48px;
      display:flex; align-items:center;
      padding:0 12px 0 0;
      border-radius:20px;
      border:2px solid #E2E8F0;
      background:white;
      cursor:pointer; touch-action:manipulation;
      box-shadow:0 2px 6px rgba(0,0,0,.07);
      overflow:hidden; position:relative;
      transition:border-color .35s, box-shadow .35s, background .4s;
    }

    /* 左の色ストライプ */
    .stripe {
      width:9px; height:100%; flex-shrink:0;
      align-self:stretch; margin-right:12px;
      transition:background .4s;
    }
    .c-bath   .stripe { background:linear-gradient(180deg,#60B5F5,#1E88E5); }
    .c-meal   .stripe { background:linear-gradient(180deg,#FFA726,#EF6C00); }
    .c-water  .stripe { background:linear-gradient(180deg,#FFCA28,#F57F17); }
    .c-yogurt .stripe { background:linear-gradient(180deg,#F06292,#AD1457); }
    .c-moku   .stripe { background:linear-gradient(180deg,#BA68C8,#6A1B9A); }
    .c-teeth  .stripe { background:linear-gradient(180deg,#4DD0E1,#00838F); }
    .c-clean  .stripe { background:linear-gradient(180deg,#81C784,#2E7D32); }
    .c-bed    .stripe { background:linear-gradient(180deg,#7986CB,#283593); }

    /* あさVer 用ストライプ色 */
    .m-wake      .stripe { background:linear-gradient(180deg,#FFD54F,#FF8F00); }
    .m-gargle    .stripe { background:linear-gradient(180deg,#4FC3F7,#0288D1); }
    .m-meal      .stripe { background:linear-gradient(180deg,#FFA726,#EF6C00); }
    .m-clothes   .stripe { background:linear-gradient(180deg,#F06292,#AD1457); }
    .m-teeth     .stripe { background:linear-gradient(180deg,#4DD0E1,#00838F); }
    .m-bag       .stripe { background:linear-gradient(180deg,#BA68C8,#6A1B9A); }
    .m-sunscreen .stripe { background:linear-gradient(180deg,#81C784,#2E7D32); }
    .m-socks     .stripe { background:linear-gradient(180deg,#7986CB,#283593); }
    .m-go        .stripe { background:linear-gradient(180deg,#EF5350,#C62828); }

    .t-icon { font-size:clamp(1.6rem,3vw,2.5rem); margin-right:10px; flex-shrink:0; line-height:1; }

    .t-name {
      flex:1; text-align:left;
      font-size:clamp(1.1rem,2.2vw,1.75rem);
      font-weight:800; color:#1E293B;
      transition:color .35s;
    }

    /* 右の丸チェック */
    .t-circle {
      width:clamp(28px,3.5vw,40px); height:clamp(28px,3.5vw,40px);
      border-radius:50%; flex-shrink:0;
      border:3px solid #CBD5E1;
      display:flex; align-items:center; justify-content:center;
      background:transparent;
      transition:all .4s cubic-bezier(.175,.885,.32,1.275);
    }
    .t-check {
      font-size:clamp(1rem,2vw,1.5rem); line-height:1;
      color:white; font-weight:900;
      opacity:0; transform:scale(0) rotate(-90deg);
      transition:all .45s cubic-bezier(.175,.885,.32,1.275);
    }

    /* ── タスクボタン（タップ後：緑） ── */
    .task.done {
      background:linear-gradient(135deg,#22C55E,#15803D);
      border-color:#16A34A;
      box-shadow:0 5px 20px rgba(34,197,94,.38);
    }
    .task.done .stripe  { background:rgba(255,255,255,.22); }
    .task.done .t-name  { color:white; }
    .task.done .t-circle {
      background:rgba(255,255,255,.28);
      border-color:rgba(255,255,255,.55);
      transform:scale(1.12);
    }
    .task.done .t-check { opacity:1; transform:scale(1) rotate(0deg); }

    /* 完了アニメーション */
    @keyframes pop {
      0%   { transform:scale(1); }
      28%  { transform:scale(1.09) rotate(.6deg); }
      55%  { transform:scale(.96) rotate(-.4deg); }
      78%  { transform:scale(1.03); }
      100% { transform:scale(1); }
    }
    .task.popping { animation:pop .55s cubic-bezier(.175,.885,.32,1.275) both; }

    /* フッター */
    .footer { margin-top:6px; display:flex; flex-direction:column; gap:5px; flex-shrink:0; }

    .celeb {
      display:none; text-align:center; padding:8px 12px;
      background:linear-gradient(135deg,#FEF9C3,#FDE047);
      border:2.5px solid #EAB308; border-radius:16px;
      font-size:clamp(.85rem,1.7vw,1.25rem); font-weight:900; color:#92400E;
      animation:pulse .8s ease infinite alternate;
    }
    @keyframes pulse {
      from { transform:scale(1); }
      to   { transform:scale(1.02); box-shadow:0 0 16px rgba(234,179,8,.5); }
    }

    .reset-btn {
      padding:7px; border-radius:14px;
      border:2px solid #E2E8F0; background:rgba(255,255,255,.7);
      color:#64748B; font-size:clamp(.75rem,1.4vw,.95rem);
      font-weight:700; cursor:pointer; font-family:inherit;
      touch-action:manipulation;
    }
    .reset-btn:active { opacity:.7; }

    /* ───── 右：時計 ───── */
    .right {
      width:48%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:6px; padding:10px;
      background:rgba(255,255,255,.25);
    }

    .clock-label {
      font-size:clamp(.85rem,1.9vw,1.4rem);
      font-weight:900; color:#334155; text-align:center; flex-shrink:0;
    }

    #clockCanvas { flex-shrink:0; display:block; }

    .digital {
      font-size:clamp(1rem,2.8vw,2.2rem);
      font-weight:900; color:#1E3A8A; letter-spacing:4px;
      background:rgba(255,255,255,.8); padding:4px 18px;
      border-radius:14px; box-shadow:0 3px 10px rgba(0,0,0,.08);
      flex-shrink:0; cursor:pointer;
      transition:background .25s, color .25s;
    }
    /* タップで答え（デジタル表示）を隠す。アナログ時計だけで
       じかんを読む練習ができるように。文字はtransparentにするだけで
       DOM上のテキストは残すため、再表示時に即座に正しい値が出る */
    .digital.hidden { background:#1E293B; color:transparent; }

    /* コンフェッティ */
    @keyframes cfFall {
      0%   { opacity:1; transform:translateY(-60px) rotate(0deg); }
      80%  { opacity:1; }
      100% { opacity:0; transform:translateY(110vh) rotate(900deg); }
    }
    .cf { position:fixed; pointer-events:none; animation:cfFall linear forwards; z-index:9999; }

    /* ── ティラノサウルス演出 ── */
    #trexOverlay {
      position:fixed;inset:0;z-index:99999;
      background:rgba(0,0,0,0.88);
      display:flex;align-items:flex-end;justify-content:center;
      cursor:pointer;overflow:hidden;
    }
    #trexOverlay.shake { animation:trexShake 0.1s ease infinite; }
    @keyframes trexShake {
      0%,100%{transform:translate(0,0) rotate(0)}
      25%{transform:translate(-5px,3px) rotate(-0.3deg)}
      75%{transform:translate(5px,-3px) rotate(0.3deg)}
    }
    #trexBgGlow {
      position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(ellipse at 60% 85%,rgba(255,70,0,0.3) 0%,transparent 65%);
      animation:glowPulse 0.45s ease infinite alternate;
    }
    @keyframes glowPulse { from{opacity:0.4} to{opacity:1} }
    #trexSvgWrap {
      position:relative;flex-shrink:0;
      width:min(94vw,540px);
      filter:drop-shadow(0 0 30px rgba(255,90,0,0.55));
      animation:trexRise 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes trexRise {
      from{transform:translateY(108%)} to{transform:translateY(0)}
    }
    #trexJaw {
      transform-box:fill-box;
      transform-origin:5% 30%;
      animation:jawDrop 0.45s 0.55s ease forwards, jawRoar 0.22s 1s ease infinite alternate;
    }
    @keyframes jawDrop { from{transform:rotate(0)} to{transform:rotate(20deg)} }
    @keyframes jawRoar { from{transform:rotate(18deg)} to{transform:rotate(25deg)} }
    #roarLabel {
      position:absolute;top:10%;left:50%;
      white-space:nowrap;
      font-size:clamp(2.5rem,9vw,6rem);font-weight:900;
      font-family:Impact,'Arial Black',sans-serif;letter-spacing:5px;
      color:#ff3300;
      opacity:0;
      animation:roarBoom 0.3s 0.75s cubic-bezier(0.175,0.885,0.32,1.275) forwards,
                roarFlicker 0.18s 1.05s ease infinite alternate;
      transform:translateX(-50%);
    }
    @keyframes roarBoom {
      0%{opacity:0;transform:translateX(-50%) scale(0.15)}
      100%{opacity:1;transform:translateX(-50%) scale(1)}
    }
    @keyframes roarFlicker {
      from{text-shadow:0 0 20px rgba(255,80,0,0.9),0 0 50px rgba(255,50,0,0.6)}
      to{text-shadow:0 0 45px rgba(255,110,0,1),0 0 90px rgba(255,40,0,0.9),0 0 130px rgba(255,0,0,0.4)}
    }
    .trexDust {
      position:absolute;bottom:2%;
      border-radius:50%;
      background:radial-gradient(circle,rgba(200,150,60,0.6),rgba(160,110,40,0.2));
      pointer-events:none;
      animation:dustPuff 1.4s ease-out forwards;
    }
    @keyframes dustPuff {
      0%{opacity:1;transform:scale(0.1) translateY(0)}
      100%{opacity:0;transform:scale(5) translateY(-30px)}
    }
    #trexTapHint {
      position:absolute;bottom:3%;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,0.45);font-size:clamp(0.75rem,2vw,1rem);
      white-space:nowrap;opacity:0;animation:hintIn 0.5s 2.2s ease forwards;
    }
    @keyframes hintIn { to{opacity:1} }

    /* ── エラスモサウルス演出（あさVer） ── */
    #elasmoOverlay {
      position:fixed;inset:0;z-index:99999;
      background:rgba(0,20,45,0.88);
      display:flex;align-items:flex-end;justify-content:center;
      cursor:pointer;overflow:hidden;
    }
    #elasmoOverlay.shake { animation:trexShake 0.1s ease infinite; }
    #elasmoBgGlow {
      position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(ellipse at 60% 60%,rgba(0,180,255,0.3) 0%,transparent 65%);
      animation:glowPulse 0.45s ease infinite alternate;
    }
    #elasmoSvgWrap {
      position:relative;flex-shrink:0;
      width:min(94vw,540px);
      filter:drop-shadow(0 0 30px rgba(0,180,255,0.55));
      animation:trexRise 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    #elasmoNeck {
      transform-box:fill-box;
      transform-origin:60% 96%;
      animation:neckSway 1.2s 0.6s ease-in-out infinite alternate;
    }
    @keyframes neckSway { from{transform:rotate(-2deg)} to{transform:rotate(3deg)} }
    #elasmoRoarLabel {
      position:absolute;top:6%;left:50%;
      white-space:nowrap;
      font-size:clamp(2.2rem,8vw,5.5rem);font-weight:900;
      font-family:Impact,'Arial Black',sans-serif;letter-spacing:4px;
      color:#00CFFF;
      opacity:0;
      animation:roarBoom 0.3s 0.75s cubic-bezier(0.175,0.885,0.32,1.275) forwards,
                elasmoFlicker 0.18s 1.05s ease infinite alternate;
      transform:translateX(-50%);
    }
    @keyframes elasmoFlicker {
      from{text-shadow:0 0 20px rgba(0,190,255,0.9),0 0 50px rgba(0,140,255,0.6)}
      to{text-shadow:0 0 45px rgba(0,220,255,1),0 0 90px rgba(0,150,255,0.9),0 0 130px rgba(0,100,255,0.4)}
    }
    .elasmoSplash {
      position:absolute;bottom:2%;
      border-radius:50%;
      background:radial-gradient(circle,rgba(190,235,255,0.8),rgba(80,170,220,0.15));
      pointer-events:none;
      animation:dustPuff 1.2s ease-out forwards;
    }
    #elasmoTapHint {
      position:absolute;bottom:3%;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,0.45);font-size:clamp(0.75rem,2vw,1rem);
      white-space:nowrap;opacity:0;animation:hintIn 0.5s 1.8s ease forwards;
    }
  </style>
</head>
<body>

<div id="dinoBg"></div>
<div id="cfContainer" style="position:fixed;inset:0;z-index:9999;pointer-events:none;overflow:hidden;"></div>

<div class="wrap">

  <!-- ===== 左：タスク ===== -->
  <div class="left">
    <div class="board-header">
      <span style="font-size:1.7rem" id="boardIconL">🦕</span>
      <h1 class="board-title" id="boardTitle">よるの やることりすと</h1>
      <span style="font-size:1.7rem" id="boardIconR">🦖</span>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn mode-morning" id="modeMorningBtn" onclick="switchMode('morning')">🌅 あさ</button>
      <button class="mode-btn mode-evening" id="modeEveningBtn" onclick="switchMode('evening')">🌙 よる</button>
    </div>

    <div class="tasks" id="tasksMorning" style="display:none">
      <button class="task m-wake"      onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🌅</span>
        <span class="t-name">おきる</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-gargle"    onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🚰</span>
        <span class="t-name">うがい</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-meal"      onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🍳</span>
        <span class="t-name">あさごはん</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-clothes"   onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">👕</span>
        <span class="t-name">おきがえ</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-teeth"     onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🦷</span>
        <span class="t-name">はみがき</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-bag"       onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🎒</span>
        <span class="t-name">ほいくえんのようい</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-sunscreen" onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🧴</span>
        <span class="t-name">ひやけどめをぬる</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-socks"     onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🧦</span>
        <span class="t-name">くつしたをはく</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task m-go"        onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🚗</span>
        <span class="t-name">しゅっぱつ！</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
    </div>

    <div class="tasks" id="tasksEvening">
      <button class="task c-bath"   onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🛁</span>
        <span class="t-name">おふろ</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task c-meal"   onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🍚</span>
        <span class="t-name">ごはん</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task c-yogurt" onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🥣</span>
        <span class="t-name">よーぐると</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task c-moku"   onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🫧</span>
        <span class="t-name">もくもく</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task c-water"  onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">💧</span>
        <span class="t-name">おみずをのむ</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task c-teeth"  onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🦷</span>
        <span class="t-name">はみがき</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task c-clean"  onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🧹</span>
        <span class="t-name">おかたづけ</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
      <button class="task c-bed"    onclick="tap(this)">
        <div class="stripe"></div><span class="t-icon">🛏️</span>
        <span class="t-name">べっどにいく</span>
        <div class="t-circle"><span class="t-check">✓</span></div>
      </button>
    </div>

    <div class="footer">
      <div class="celeb" id="celeb">🎉 ぜんぶできたよ！えらい！🦖💫🦕 🎉</div>
      <button class="reset-btn" onclick="resetAll()">🔄 もう一度はじめる</button>
    </div>
  </div>

  <!-- ===== 右：時計 ===== -->
  <div class="right" id="clockPanel" onclick="speakTime()" style="cursor:pointer;">
    <div class="clock-label">🦕 いま なんじ？ 🦖</div>
    <canvas id="clockCanvas"></canvas>
    <div class="digital" id="digital" onclick="toggleDigital(event)">--:--</div>
  </div>
</div>

<script>
/* ── 背景の恐竜 ── */
(function () {
  const bg = document.getElementById('dinoBg');
  const items = [
    {e:'🦖',t:'3%', l:'2%',  s:'4rem',  d:'4.2s',dl:'0s'  },
    {e:'🦕',t:'72%',l:'3%',  s:'4.5rem',d:'5.1s',dl:'1.3s'},
    {e:'🦖',t:'38%',l:'46%', s:'3.5rem',d:'3.8s',dl:'0.7s'},
    {e:'🦕',t:'5%', r:'2%',  s:'4rem',  d:'4.7s',dl:'2s'  },

/* ── アナログ時計 ── */
const canvas = document.getElementById('clockCanvas');
const ctx    = canvas.getContext('2d');

/* 分針を「秒針が一周したらカチッと1分進む」動きにするための状態
   （60秒で1分、の概念を子どもがつかみやすいように） */
let _lastMinute = -1;
let _minuteTickAt = null;

/* 秒針も同様に、なめらかな連続移動ではなく1秒ごとに「カチッ」と動く
   （本物のクオーツ時計の秒針の動きに近づける） */
let _lastSecond = -1;
let _secondTickAt = null;

function resizeClock() {
  const panel = document.getElementById('clockPanel');
  const w = panel.clientWidth;
  const h = panel.clientHeight;
  if (w < 50 || h < 50) return;
  const label   = panel.querySelector('.clock-label');
  const digital = document.getElementById('digital');
  const usedH = (label ? label.offsetHeight : 30) + (digital ? digital.offsetHeight : 50) + 40;
  const size = Math.max(80, Math.min(w - 20, h - usedH, 520));
  if (canvas.width === size) return;
  canvas.width  = size;
  canvas.height = size;
}

function drawHand(angle, len, width, color) {
  const cos = Math.cos(angle), sin = Math.sin(angle);
  const pc  = Math.cos(angle + Math.PI / 2), ps = Math.sin(angle + Math.PI / 2);
  const hw  = width / 2;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.28)'; ctx.shadowBlur = 8;
  ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 3;
  ctx.beginPath();
  ctx.moveTo(pc * hw, ps * hw);
  ctx.lineTo(cos * len + pc * (width * .14), sin * len + ps * (width * .14));
  ctx.lineTo(cos * len, sin * len);
  ctx.lineTo(cos * len - pc * (width * .14), sin * len - ps * (width * .14));
  ctx.lineTo(-pc * hw, -ps * hw);
  ctx.lineTo(-cos * width * .1, -sin * width * .1);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function drawClock() {
  const size = canvas.width;
  if (size < 10) return;
  const R = size / 2 * .92;

  ctx.clearRect(0, 0, size, size);
  ctx.save();
  ctx.translate(size / 2, size / 2);

  const grad = ctx.createRadialGradient(0, -R * .15, R * .1, 0, 0, R);
  grad.addColorStop(0, '#FFFEF5');
  grad.addColorStop(1, '#FFF3E0');
  ctx.beginPath(); ctx.arc(0, 0, R, 0, 2 * Math.PI);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#FF6D00'; ctx.lineWidth = Math.max(5, size * .018); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, R * .905, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,109,0,.15)'; ctx.lineWidth = 1.5; ctx.stroke();

  for (let i = 0; i < 60; i++) {
    const a  = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const isH = i % 5 === 0;
    const r1 = R * .88, r2 = isH ? R * .73 : R * .83;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
    ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    ctx.strokeStyle = isH ? '#475569' : '#CBD5E1';
    ctx.lineWidth   = isH ? Math.max(3, size * .008) : 1.2;
    ctx.lineCap = 'round'; ctx.stroke();
  }

  const numR  = R * .61;
  const fSize = Math.max(16, size * .099);
  const big   = new Set([12, 3, 6, 9]);
  for (let n = 1; n <= 12; n++) {
    const a = (n / 12) * 2 * Math.PI - Math.PI / 2;
    const x = Math.cos(a) * numR, y = Math.sin(a) * numR;
    ctx.beginPath(); ctx.arc(x, y, fSize * .64, 0, 2 * Math.PI);
    ctx.fillStyle = big.has(n) ? 'rgba(255,109,0,.2)' : 'rgba(255,255,255,.75)';
    ctx.fill();
    ctx.font         = `900 ${fSize}px 'Hiragino Maru Gothic Pro','Noto Sans JP',sans-serif`;
    ctx.fillStyle    = big.has(n) ? '#C2410C' : '#1E293B';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n, x, y);
  }

  const now = new Date();
  const h  = now.getHours() % 12, m = now.getMinutes();
  const s  = now.getSeconds();
  const hS = h + m / 60;   // 時針は分に合わせてゆっくり進む

  /* 分針は秒針が0秒に戻った瞬間だけ「カチッ」と1分ぶん動く。
     切り替わった直後に軽くバウンドさせて動きを目立たせる。 */
  if (m !== _lastMinute) {
    if (_lastMinute !== -1) _minuteTickAt = now.getTime();
    _lastMinute = m;
  }
  let minuteBounce = 0;
  if (_minuteTickAt !== null) {
    const dt = (now.getTime() - _minuteTickAt) / 1000;
    if (dt < 0.5) minuteBounce = 0.09 * Math.exp(-dt * 11) * Math.sin(2 * Math.PI * 6 * dt);
    else _minuteTickAt = null;
  }

  /* 秒針も同じ理屈で、1秒ごとに「カチッ」と固定位置へ動く */
  if (s !== _lastSecond) {
    if (_lastSecond !== -1) _secondTickAt = now.getTime();
    _lastSecond = s;
  }
  let secondBounce = 0;
  if (_secondTickAt !== null) {
    const dt = (now.getTime() - _secondTickAt) / 1000;
    if (dt < 0.3) secondBounce = 0.07 * Math.exp(-dt * 16) * Math.sin(2 * Math.PI * 7 * dt);
    else _secondTickAt = null;
  }

  drawHand((hS / 12) * 2 * Math.PI - Math.PI / 2, R * .50, Math.max(8, size * .021), '#1E3A8A');
  drawHand((m / 60) * 2 * Math.PI - Math.PI / 2 + minuteBounce, R * .72, Math.max(6, size * .013), '#DC2626');

  const sA = (s / 60) * 2 * Math.PI - Math.PI / 2 + secondBounce;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.2)'; ctx.shadowBlur = 5;
  ctx.strokeStyle = '#EA580C'; ctx.lineWidth = Math.max(2, size * .005); ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(Math.cos(sA + Math.PI) * R * .2, Math.sin(sA + Math.PI) * R * .2);
  ctx.lineTo(Math.cos(sA) * R * .84, Math.sin(sA) * R * .84);
  ctx.stroke();
  ctx.restore();

  ctx.beginPath(); ctx.arc(0, 0, Math.max(8, size * .025), 0, 2 * Math.PI);
  ctx.fillStyle = '#EA580C'; ctx.fill();
  ctx.beginPath(); ctx.arc(0, 0, Math.max(4, size * .012), 0, 2 * Math.PI);
  ctx.fillStyle = 'white'; ctx.fill();

  ctx.restore();

  const h24d = now.getHours();
  const h12d = h24d % 12 || 12;
  let tod;
  if (h24d >= 4 && h24d <= 10)       tod = 'あさ';
  else if (h24d >= 11 && h24d <= 15) tod = 'おひる';
  else if (h24d >= 16 && h24d <= 17) tod = 'ゆうがた';
  else                                tod = 'よる';
  const digitalText = m === 0
    ? `${tod} ${h12d}じ`
    : `${tod} ${h12d}じ ${m}ふん`;
  document.getElementById('digital').textContent = digitalText;
}

function tick() { drawClock(); requestAnimationFrame(tick); }

/* ── あさ／よる 切り替え ── */
let currentMode = 'evening';

function activeTasksEl() {
  return document.getElementById(currentMode === 'morning' ? 'tasksMorning' : 'tasksEvening');
}

function switchMode(mode) {
  currentMode = mode;
  const isMorning = mode === 'morning';
  document.getElementById('tasksMorning').style.display = isMorning ? 'flex' : 'none';
  document.getElementById('tasksEvening').style.display = isMorning ? 'none' : 'flex';
  document.getElementById('modeMorningBtn').classList.toggle('active', isMorning);
  document.getElementById('modeEveningBtn').classList.toggle('active', !isMorning);
  document.getElementById('boardTitle').textContent = isMorning ? 'あさの やることりすと' : 'よるの やることりすと';
  document.getElementById('boardIconL').textContent = isMorning ? '🌞' : '🦕';
  document.getElementById('boardIconR').textContent = isMorning ? '☀️' : '🦖';
  checkAll();
}

/* ── タスク ── */
function tap(btn) {
  const completing = !btn.classList.contains('done');
  btn.classList.toggle('done');
  if (completing) {
    btn.classList.remove('popping');
    void btn.offsetWidth;
    btn.classList.add('popping');
    btn.addEventListener('animationend', () => btn.classList.remove('popping'), { once: true });
    if (navigator.vibrate) navigator.vibrate([30, 10, 45]);
  }
  checkAll();
}

function checkAll() {
  const container = activeTasksEl();
  const all  = container.querySelectorAll('.task');
  const done = container.querySelectorAll('.task.done');
  const cel  = document.getElementById('celeb');
  if (all.length === done.length) {
    cel.style.display = 'block';
    confetti();
    setTimeout(currentMode === 'morning' ? showElasmosaurus : showTRex, 800);
  } else {
    cel.style.display = 'none';
  }
}

function resetAll() {
  activeTasksEl().querySelectorAll('.task.done').forEach(b => b.classList.remove('done'));
  document.getElementById('celeb').style.display = 'none';
}

          <circle cx="254" cy="96" r="2.2" fill="white"/>
          <circle cx="274" cy="97" r="1.8" fill="#4A6076"/>
        </g>

        <!-- 水しぶき -->
        <path d="M 205,372 Q 190,352 196,332 Q 178,348 186,372 Z" fill="#E9F8FE" opacity="0.9"/>
        <path d="M 448,362 Q 462,340 456,320 Q 474,338 466,362 Z" fill="#E9F8FE" opacity="0.9"/>
        <circle cx="160" cy="330" r="6" fill="#DFF4FB"/>
        <circle cx="176" cy="302" r="4" fill="#DFF4FB"/>
        <circle cx="472" cy="308" r="5" fill="#DFF4FB"/>
        <circle cx="452" cy="284" r="3" fill="#DFF4FB"/>
        <path d="M 120,408 Q 160,398 200,408" stroke="#E9F8FE" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
        <path d="M 380,414 Q 420,404 460,412" stroke="#E9F8FE" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
      </svg>
    </div>
    <div id="elasmoTapHint">タップで閉じる</div>
  `;
  document.body.appendChild(ov);

  ov.classList.add('shake');
  setTimeout(() => ov.classList.remove('shake'), 1800);

  setTimeout(() => {
    [[22, 26], [40, 20], [15, 16], [55, 22]].forEach(([lp, sz], i) => {
      const splash = document.createElement('div');
      splash.className = 'elasmoSplash';
      splash.style.cssText = `left:${lp}%;width:${sz}px;height:${sz}px;animation-delay:${i*0.13}s`;
      ov.appendChild(splash);
    });
  }, 500);

  function playSplashRoar() {
    try {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const dur = 2.4, sr = ac.sampleRate;
      const buf = ac.createBuffer(1, sr * dur, sr);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const t = i / sr;
        const splashEnv = t < 0.35 ? Math.max(0, 1 - t / 0.35) : 0;
        const splashNoise = (Math.random() - 0.5) * 2 * splashEnv * 0.6;
        const gt = Math.max(0, t - 0.15);
        const groanEnv = Math.min(1, gt * 4) * Math.pow(Math.max(0, 1 - gt / (dur - 0.15)), 0.5);
        const f = 65 + gt * 20;
        const vib = Math.sin(2 * Math.PI * 7 * t) * 0.018;
        const groan = (
          Math.sin(2 * Math.PI * f * (1 + vib) * gt) * 0.38 +
          Math.sin(2 * Math.PI * f * 1.48 * gt) * 0.22 +
          Math.sin(2 * Math.PI * f * 2.02 * gt) * 0.14
        ) * groanEnv;
        d[i] = (splashNoise + groan) * 0.8;
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 500;
      const g = ac.createGain(); g.gain.value = 1.3;
      src.connect(lp); lp.connect(g); g.connect(ac.destination);
      src.start();
    } catch(e) {}
  }
  playSplashRoar();

  setTimeout(() => {
    ov.style.transition = 'opacity 0.8s';
    ov.style.opacity = '0';
    setTimeout(() => ov.remove(), 800);
  }, 4500);

  ov.addEventListener('click', () => {
    ov.style.transition = 'opacity 0.3s';
    ov.style.opacity = '0';
    setTimeout(() => ov.remove(), 300);
  });
}

/* ── 時刻読み上げ ── */
/* ひらがなベタ書きだと音声エンジンがアクセントを推定できず不自然になるため、
   漢字まじりの文を渡し、端末にある中で最も自然な日本語音声を選ぶ */
let jpVoice = null;
function pickJapaneseVoice() {
  const voices = speechSynthesis.getVoices().filter(v => v.lang && v.lang.replace('_','-').startsWith('ja'));
  if (!voices.length) return null;
  const rank = v =>
    /Google/i.test(v.name)              ? 0 :  // Google 日本語（Chrome、最も自然）
    /Siri/i.test(v.name)                ? 1 :
    /Enhanced|拡張/i.test(v.name)        ? 2 :
    /Kyoko/i.test(v.name)               ? 3 : 4;
  return voices.sort((a, b) => rank(a) - rank(b))[0];
}
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => { jpVoice = pickJapaneseVoice(); };
  jpVoice = pickJapaneseVoice();
}

function speakTime() {
  const now = new Date();
  const h24 = now.getHours();
  const m   = now.getMinutes();
  const h12 = h24 % 12 || 12;

  let timeOfDay;
  if (h24 >= 4 && h24 <= 10)       timeOfDay = '朝';
  else if (h24 >= 11 && h24 <= 15) timeOfDay = 'お昼';
  else if (h24 >= 16 && h24 <= 17) timeOfDay = '夕方';
  else                              timeOfDay = '夜';

  const text = m === 0
    ? `${timeOfDay}、${h12}時だよ`
    : `${timeOfDay}、${h12}時${m}分だよ`;

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  if (!jpVoice) jpVoice = pickJapaneseVoice();
  if (jpVoice) utter.voice = jpVoice;
  utter.rate = 1.0;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

/* デジタル表示（答え）のタップで黒く隠す／再タップで見せる。
   親の時計パネル全体には「タップで読み上げ」が付いているため、
   ここだけは伝播を止めて読み上げが同時に鳴らないようにする */
function toggleDigital(e) {
  e.stopPropagation();
  document.getElementById('digital').classList.toggle('hidden');
}

/* ── 初期化 ── */
if (window.ResizeObserver) {
  new ResizeObserver(resizeClock).observe(document.getElementById('clockPanel'));
}

let _polls = 0;
function pollResize() {
  resizeClock();
  if (canvas.width < 80 && ++_polls < 40) setTimeout(pollResize, 200);
}

window.addEventListener('load', () => {
  const h = new Date().getHours();
  switchMode(h >= 4 && h < 11 ? 'morning' : 'evening');
  pollResize(); tick();
});
window.addEventListener('resize', resizeClock);
