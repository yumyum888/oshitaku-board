<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FFF8E1">
  <title>🦖 お支度ボード 🦕</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: 'Hiragino Maru Gothic Pro', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: linear-gradient(135deg, #FFF8E1 0%, #E8F5E9 60%, #E3F2FD 100%);
      user-select: none; -webkit-user-select: none;
    }

    /* ── 背景の恐竜たち ── */
    #dinoBg {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .dino {
      position: absolute; opacity: 0.1;
      animation: dinoFloat ease-in-out infinite;
    }
    @keyframes dinoFloat {
      0%,100% { transform: translateY(0) rotate(-8deg); }
      50%      { transform: translateY(-18px) rotate(8deg); }
    }

    /* ── レイアウト ── */
    .wrap {
      position: relative; z-index: 1;
      display: flex; height: 100vh; width: 100vw;
    }
    @media (orientation: portrait) {
      .wrap { flex-direction: column-reverse; }
      .left, .right { width: 100% !important; height: 50% !important; }
      .right { border-left: none !important; border-bottom: 3px dashed rgba(255,152,0,.4); }
    }

    /* ──────────── 左：お支度ボード ──────────── */
    .left {
      width: 52%; height: 100%;
      padding: 14px 16px 10px;
      display: flex; flex-direction: column;
      background: rgba(255,255,255,.5);
      backdrop-filter: blur(8px);
    }

    .board-header {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 10px;
    }
    .board-title {
      font-size: clamp(1.4rem, 2.8vw, 2.1rem);
      font-weight: 900; color: #BF360C;
      letter-spacing: 1px;
    }

    .tasks { flex: 1; display: flex; flex-direction: column; gap: 7px; overflow-y: auto; }

    .task {
      flex: 1; min-height: 60px;
      display: flex; align-items: center;
      padding: 0 16px; border-radius: 30px; border: none;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 4px 12px rgba(0,0,0,.15), 0 1px 3px rgba(0,0,0,.1);
      transition: transform .35s cubic-bezier(.175,.885,.32,1.275),
                  background .4s ease, box-shadow .4s ease;
    }
    .task:active { transform: scale(.93) !important; }

    .t-icon { font-size: clamp(1.8rem,3.5vw,2.8rem); margin-right: 12px; flex-shrink: 0; line-height:1; }
    .t-name {
      flex: 1; font-size: clamp(1.25rem,2.5vw,1.9rem);
      font-weight: 800; color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,.25);
      text-align: left;
    }
    .t-check {
      font-size: clamp(1.6rem,3vw,2.2rem);
      opacity: 0; transform: scale(0) rotate(-30deg);
      transition: opacity .45s ease, transform .45s cubic-bezier(.175,.885,.32,1.275);
      flex-shrink: 0;
    }
    .task.done .t-check { opacity: 1; transform: scale(1) rotate(0deg); }

    /* 各タスクの色 */
    .c-bath    { background: linear-gradient(135deg,#42A5F5,#1565C0); }
    .c-meal    { background: linear-gradient(135deg,#FFA726,#E65100); }
    .c-yogurt  { background: linear-gradient(135deg,#EC407A,#880E4F); }
    .c-moku    { background: linear-gradient(135deg,#AB47BC,#4A148C); }
    .c-teeth   { background: linear-gradient(135deg,#26C6DA,#00838F); }
    .c-clean   { background: linear-gradient(135deg,#66BB6A,#2E7D32); }
    .c-bed     { background: linear-gradient(135deg,#7986CB,#283593); }

    .task.done {
      background: linear-gradient(135deg,#4CAF50,#1B5E20) !important;
      box-shadow: 0 4px 20px rgba(76,175,80,.5), 0 1px 3px rgba(0,0,0,.1) !important;
    }

    /* フッター */
    .footer { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }

    .celeb {
      display: none; text-align: center;
      padding: 10px 14px;
      background: linear-gradient(135deg,#FFF9C4,#FFEE58);
      border: 3px solid #F9A825; border-radius: 20px;
      font-size: clamp(.95rem,1.9vw,1.4rem); font-weight: 900; color: #E65100;
      animation: celebPulse .8s ease infinite alternate;
    }
    @keyframes celebPulse {
      from { transform:scale(1); }
      to   { transform:scale(1.025); box-shadow:0 0 18px rgba(249,168,37,.5); }
    }

    .reset-btn {
      padding: 9px; border-radius: 20px;
      border: 2px solid #CFD8DC; background: rgba(255,255,255,.65);
      color: #607D8B; font-size: clamp(.82rem,1.5vw,1.05rem);
      font-weight: 700; cursor: pointer; font-family: inherit;
      touch-action: manipulation;
    }
    .reset-btn:active { opacity: .7; }

    /* ──────────── 右：時計 ──────────── */
    .right {
      width: 48%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 16px;
      border-left: 3px dashed rgba(255,152,0,.4);
    }

    .clock-label {
      font-size: clamp(1rem,2.2vw,1.6rem);
      font-weight: 900; color: #37474F; text-align: center;
    }

    #clockCanvas { flex-shrink: 0; }

    .digital {
      font-size: clamp(2rem,5.5vw,4.5rem);
      font-weight: 900; color: #1A237E; letter-spacing: 4px;
      background: rgba(255,255,255,.7); padding: 6px 24px;
      border-radius: 18px; box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }

    /* コンフェッティ */
    @keyframes cfFall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity:1; }
      80%  { opacity:1; }
      100% { transform: translateY(110vh) rotate(900deg); opacity:0; }
    }
    .cf {
      position: fixed; pointer-events: none;
      animation: cfFall linear forwards; z-index: 9999;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- 背景の恐竜デコレーション -->
<div id="dinoBg"></div>

<div class="wrap">

  <!-- ===== 左：お支度ボード ===== -->
  <div class="left">
    <div class="board-header">
      <span style="font-size:2rem">🦕</span>
      <h1 class="board-title">お支度ボード</h1>
      <span style="font-size:2rem">🦖</span>
    </div>

    <div class="tasks" id="tasks">
      <button class="task c-bath"   onclick="tap(this)">
        <span class="t-icon">🛁</span>
        <span class="t-name">お風呂</span>
        <span class="t-check">✅</span>
      </button>
      <button class="task c-meal"   onclick="tap(this)">
        <span class="t-icon">🍚</span>
        <span class="t-name">ご飯</span>
        <span class="t-check">✅</span>
      </button>
      <button class="task c-yogurt" onclick="tap(this)">
        <span class="t-icon">🥣</span>
        <span class="t-name">ヨーグルト</span>
        <span class="t-check">✅</span>
      </button>
      <button class="task c-moku"   onclick="tap(this)">
        <span class="t-icon">🫧</span>
        <span class="t-name">もくもく</span>
        <span class="t-check">✅</span>
      </button>
      <button class="task c-teeth"  onclick="tap(this)">
        <span class="t-icon">🦷</span>
        <span class="t-name">歯磨き</span>
        <span class="t-check">✅</span>
      </button>
      <button class="task c-clean"  onclick="tap(this)">
        <span class="t-icon">🧹</span>
        <span class="t-name">お片づけ</span>
        <span class="t-check">✅</span>
      </button>
      <button class="task c-bed"    onclick="tap(this)">
        <span class="t-icon">🛏️</span>
        <span class="t-name">ベッドに行く</span>
        <span class="t-check">✅</span>
      </button>
    </div>

    <div class="footer">
      <div class="celeb" id="celeb">
        🎉 ぜんぶできたよ！ えらい！ 🦖💫🦕 🎉
      </div>
      <button class="reset-btn" onclick="resetAll()">🔄 もう一度はじめる</button>
    </div>
  </div>

  <!-- ===== 右：時計 ===== -->
  <div class="right" id="clockPanel">
    <div class="clock-label">🦕 いま なんじ？ 🦖</div>
    <canvas id="clockCanvas"></canvas>
    <div class="digital" id="digital">00:00</div>
  </div>
</div>

<script>
/* ── 背景恐竜 ── */
(function () {
  const bg  = document.getElementById('dinoBg');
  const emojis = ['🦖','🦕'];
  const spots = [
    { top:'3%',  left:'2%',   size:'4rem',  dur:'4.2s', delay:'0s'   },
    { top:'72%', left:'3%',   size:'4.5rem',dur:'5.1s', delay:'1.3s' },
    { top:'38%', left:'47%',  size:'3.5rem',dur:'3.8s', delay:'0.7s' },
    { top:'4%',  right:'2%',  size:'4rem',  dur:'4.7s', delay:'2s'   },
    { top:'78%', right:'3%',  size:'4.5rem',dur:'3.5s', delay:'0.4s' },
    { top:'48%', right:'46%', size:'3rem',  dur:'5.4s', delay:'1.7s' },
    { top:'22%', left:'23%',  size:'3rem',  dur:'4s',   delay:'2.5s' },
    { top:'58%', right:'22%', size:'3.5rem',dur:'4.9s', delay:'0.9s' },
    { top:'85%', left:'42%',  size:'3rem',  dur:'4.3s', delay:'0.3s' },
    { top:'15%', right:'22%', size:'2.8rem',dur:'5.2s', delay:'3.1s' },
  ];
  spots.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'dino';
    el.textContent = emojis[i % 2];
    el.style.fontSize = p.size;
    el.style.animationDuration = p.dur;
    el.style.animationDelay   = p.delay;
    if (p.top)   el.style.top   = p.top;
    if (p.left)  el.style.left  = p.left;
    if (p.right) el.style.right = p.right;
    bg.appendChild(el);
  });
})();

/* ── Canvas 時計 ── */
const canvas = document.getElementById('clockCanvas');
const ctx    = canvas.getContext('2d');

function resizeClock() {
  const panel  = document.getElementById('clockPanel');
  const availW = panel.clientWidth  - 32;
  const availH = panel.clientHeight - 140;
  const size   = Math.min(availW, availH, 500);
  canvas.width  = size;
  canvas.height = size;
}

function drawHand(angle, len, width, color) {
  const cos  = Math.cos(angle), sin = Math.sin(angle);
  const perpC = Math.cos(angle + Math.PI/2), perpS = Math.sin(angle + Math.PI/2);
  const hw = width / 2;
  ctx.save();
  ctx.shadowColor   = 'rgba(0,0,0,.28)';
  ctx.shadowBlur    = 7;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  ctx.beginPath();
  ctx.moveTo( perpC * hw,              perpS * hw);
  ctx.lineTo( cos * len + perpC * (width*.15), sin * len + perpS * (width*.15));
  ctx.lineTo( cos * len,               sin * len);
  ctx.lineTo( cos * len - perpC * (width*.15), sin * len - perpS * (width*.15));
  ctx.lineTo(-perpC * hw,             -perpS * hw);
  ctx.lineTo(-cos * width*.08,        -sin * width*.08);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function drawClock() {
  const size = canvas.width;
  const R  = size / 2 * 0.93;
  ctx.clearRect(0, 0, size, size);
  ctx.save();
  ctx.translate(size/2, size/2);

  /* 文字盤 */
  const grad = ctx.createRadialGradient(0,0,R*.5,0,0,R);
  grad.addColorStop(0,'#FFFDE7');
  grad.addColorStop(1,'#FFF3E0');
  ctx.beginPath(); ctx.arc(0,0,R,0,2*Math.PI);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#FF6D00'; ctx.lineWidth = Math.max(5,size*.016); ctx.stroke();

  ctx.beginPath(); ctx.arc(0,0,R*.92,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,109,0,.2)'; ctx.lineWidth=2; ctx.stroke();

  /* 目盛り */
  for (let i=0; i<60; i++) {
    const a  = (i/60)*2*Math.PI - Math.PI/2;
    const isH = i%5===0;
    const r1 = R*.88, r2 = isH ? R*.76 : R*.84;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r1, Math.sin(a)*r1);
    ctx.lineTo(Math.cos(a)*r2, Math.sin(a)*r2);
    ctx.strokeStyle = isH ? '#5D4037' : '#BCAAA4';
    ctx.lineWidth   = isH ? Math.max(2.5,size*.007) : 1;
    ctx.lineCap = 'round'; ctx.stroke();
  }

  /* 数字 1〜12（全て表示） */
  const numR  = R * .63;
  const fSize = Math.max(14, size * .094);
  const big   = new Set([12,3,6,9]);
  for (let n=1; n<=12; n++) {
    const a = (n/12)*2*Math.PI - Math.PI/2;
    const x = Math.cos(a)*numR, y = Math.sin(a)*numR;
    /* 背景の丸 */
    ctx.beginPath(); ctx.arc(x,y,fSize*.6,0,2*Math.PI);
    ctx.fillStyle = big.has(n) ? 'rgba(255,109,0,.2)' : 'rgba(255,255,255,.6)';
    ctx.fill();
    /* 数字 */
    ctx.font      = `900 ${fSize}px 'Hiragino Maru Gothic Pro','Noto Sans JP',sans-serif`;
    ctx.fillStyle  = big.has(n) ? '#BF360C' : '#37474F';
    ctx.textAlign  = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n, x, y);
  }

  /* 時刻取得（なめらか） */
  const now = new Date();
  const h  = now.getHours()   % 12;
  const m  = now.getMinutes();
  const s  = now.getSeconds();
  const ms = now.getMilliseconds();
  const sS = s  + ms/1000;
  const mS = m  + sS/60;
  const hS = h  + mS/60;

  const hA = (hS/12)*2*Math.PI - Math.PI/2;
  const mA = (mS/60)*2*Math.PI - Math.PI/2;
  const sA = (sS/60)*2*Math.PI - Math.PI/2;

  /* 時針 */
  drawHand(hA, R*.5,  Math.max(7,size*.018), '#263238');
  /* 分針 */
  drawHand(mA, R*.73, Math.max(5,size*.012), '#B71C1C');
  /* 秒針 */
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.2)'; ctx.shadowBlur=5; ctx.shadowOffsetX=1; ctx.shadowOffsetY=2;
  ctx.strokeStyle='#FF6D00'; ctx.lineWidth=Math.max(1.5,size*.004); ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(Math.cos(sA+Math.PI)*R*.18, Math.sin(sA+Math.PI)*R*.18);
  ctx.lineTo(Math.cos(sA)*R*.85,          Math.sin(sA)*R*.85);
  ctx.stroke();
  ctx.restore();

  /* 中心キャップ */
  ctx.beginPath(); ctx.arc(0,0,Math.max(7,size*.022),0,2*Math.PI);
  ctx.fillStyle='#FF6D00'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,Math.max(3,size*.009),0,2*Math.PI);
  ctx.fillStyle='white'; ctx.fill();

  ctx.restore();

  /* デジタル時刻 */
  const HH = now.getHours().toString().padStart(2,'0');
  const MM = m.toString().padStart(2,'0');
  document.getElementById('digital').textContent = `${HH}:${MM}`;
}

function tick() { drawClock(); requestAnimationFrame(tick); }

/* ── タスク操作 ── */
function tap(btn) {
  btn.classList.toggle('done');
  if (navigator.vibrate) navigator.vibrate(40);
  checkDone();
}

function checkDone() {
  const all  = document.querySelectorAll('.task');
  const done = document.querySelectorAll('.task.done');
  const cel  = document.getElementById('celeb');
  if (all.length === done.length) {
    cel.style.display = 'block';
    launchConfetti();
  } else {
    cel.style.display = 'none';
  }
}

function resetAll() {
  document.querySelectorAll('.task.done').forEach(b => b.classList.remove('done'));
  document.getElementById('celeb').style.display = 'none';
}

/* ── コンフェッティ ── */
function launchConfetti() {
  const cols = ['#FF6D00','#FFC107','#4FC3F7','#69F0AE','#CE93D8','#FF8A80','#FFEB3B','#F06292'];
  for (let i=0; i<90; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cf';
      const w = 8 + Math.random()*10;
      const h = 8 + Math.random()*12;
      el.style.cssText = `
        left:${Math.random()*100}vw;
        width:${w}px; height:${h}px;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        animation-duration:${1.5+Math.random()*2}s;
        border-radius:${Math.random()>.5?'50%':'3px'};
        transform:rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3800);
    }, i * 22);
  }
}

/* ── 初期化 ── */
window.addEventListener('load', () => {
  resizeClock();
  tick();
});
window.addEventListener('resize', resizeClock);
</script>
</body>
</html>
